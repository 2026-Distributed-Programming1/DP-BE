spring:
  application:
    name: DP-BE
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME}
  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED:true}
    locations: classpath:db/migration
    baseline-on-migrate: ${SPRING_FLYWAY_BASELINE_ON_MIGRATE:false}
  session:
    store-type: jdbc
    jdbc:
      initialize-schema: never

server:
  port: ${SERVER_PORT:8080}
  servlet:
    session:
      timeout: ${SESSION_TIMEOUT:30m}
      cookie:
        name: ${SESSION_COOKIE_NAME:DPBE_SESSION}
        http-only: true
        secure: ${SESSION_COOKIE_SECURE:false}
        same-site: ${SESSION_COOKIE_SAME_SITE:lax}

# 기동 시 초기 데이터 시더 (DataSeeder). 실 DB 보호용으로 false 가능.
app:
  auth:
    bootstrap:
      enabled: ${APP_AUTH_BOOTSTRAP_ENABLED:true}
      username: ${APP_AUTH_BOOTSTRAP_USERNAME:admin}
      password: ${APP_AUTH_BOOTSTRAP_PASSWORD:}
      display-name: ${APP_AUTH_BOOTSTRAP_DISPLAY_NAME:관리자}
  seed:
    enabled: ${APP_SEED_ENABLED:true}
  upload:
    dispatch-dir: ${APP_UPLOAD_DISPATCH_DIR:uploads/dispatch}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://127.0.0.1:3000,http://127.0.0.1:5173,https://*.vercel.app}
